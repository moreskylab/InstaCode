{% extends "base.html" %}
{% block title %}Delete {{ user_obj.username }} – InstaCode{% endblock %}

{% block content %}
<div class="max-w-screen-sm mx-auto px-4 py-8">

  <a href="{% url 'typing_practice:user_list' %}" class="text-xs text-gray-500 hover:text-gray-300 transition-colors flex items-center gap-1 mb-6">
    <i class="fa-solid fa-arrow-left"></i> Back to Users
  </a>

  <div class="bg-gray-900 border border-red-800/50 rounded-2xl p-8 text-center">
    <div class="w-14 h-14 bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
      <i class="fa-solid fa-trash text-red-400 text-xl"></i>
    </div>
    <h1 class="text-xl font-bold font-mono text-white mb-2">Delete User</h1>
    <p class="text-gray-400 text-sm mb-6">
      Are you sure you want to delete
      <span class="font-mono text-white font-semibold">{{ user_obj.username }}</span>?
      This action cannot be undone.
    </p>
    <form method="post" class="flex items-center gap-3 justify-center">
      {% csrf_token %}
      <button type="submit"
              class="bg-red-700 hover:bg-red-600 text-white font-semibold px-6 py-2.5 rounded-lg transition-colors text-sm flex items-center gap-2">
        <i class="fa-solid fa-trash"></i> Yes, Delete
      </button>
      <a href="{% url 'typing_practice:user_list' %}"
         class="px-6 py-2.5 bg-gray-800 hover:bg-gray-700 text-gray-300 font-semibold rounded-lg transition-colors text-sm">
        Cancel
      </a>
    </form>
  </div>

</div>
{% endblock %}
